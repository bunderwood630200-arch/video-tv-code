<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video TV Code - Activate Device</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .top-bar {
      background: #007BFF;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    .main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .brand {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .box {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 15px;
      font-size: 22px;
      text-align: center;
      margin: 15px 0;
      letter-spacing: 6px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .steps {
      text-align: left;
      margin-top: 20px;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      font-size: 15px;
    }

    .support {
      margin-top: 15px;
      font-size: 14px;
    }

    .error {
      color: red;
      display: none;
    }
  </style>
</head>
<body>

<div class="top-bar">
  📞 Support: (888) 498-9259
</div>

<div class="main">
  <div class="brand">📺 Video TV Code</div>

  <div class="box">
    <h2>Activate Your Device</h2>
    <p>Enter the code shown on your TV</p>

    <input type="text" id="code" maxlength="6" placeholder="ABC123">
    <div class="error" id="error">Enter a valid 6-digit code</div>

    <button onclick="registerDevice()">Register Device</button>

    <div class="steps">
      <div><strong>Step 1:</strong> Open Video TV app on your Smart TV</div>
      <div><strong>Step 2:</strong> Enter the 6-digit code displayed on your TV</div>
      <div><strong>Step 3:</strong> Call support to complete verification</div>
    </div>

    <div class="support">
      Need help? Call <strong>(888) 498-9259</strong>
    </div>
  </div>
</div>

<script>
function registerDevice() {
  const code = document.getElementById("code").value;
  const error = document.getElementById("error");

  if (!/^[A-Za-z0-9]{6}$/.test(code)) {
    error.style.display = "block";
    return;
  }

  window.location.href = "success.html";
}
</script>

</body>
</html>
