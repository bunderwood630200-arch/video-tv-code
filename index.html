<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video TV Code</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, rgba(15,23,30,0.9), rgba(15,23,30,1)),
              url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db');
  background-size: cover;
  color: white;
}

/* HEADER */
.header {
  padding: 20px 40px;
  font-size: 32px;
  font-weight: bold;
}

/* MAIN */
.main {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 80vh;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 16px;
  width: 400px;
  text-align: center;
  animation: fadeIn 0.8s ease;
}

input {
  width: 80%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  text-align: center;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#00a8e1,#0077b6);
  color: white;
  cursor: pointer;
}

.call-btn {
  display: block;
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  background: linear-gradient(90deg,#1f80e0,#1558a6);
  color: white;
  text-decoration: none;
}

.support-note {
  font-size: 10px;
  color: #777;
}

/* LEGAL BUTTONS */
.legal-buttons {
  margin-top: 20px;
  text-align: center;
}

.legal-buttons a {
  display: inline-block;
  padding: 8px 14px;
  margin: 5px;
  font-size: 12px;
  color: #00a8e1;
  border: 1px solid #00a8e1;
  border-radius: 6px;
  text-decoration: none;
  transition: 0.3s;
}

.legal-buttons a:hover {
  background: #00a8e1;
  color: white;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
}

/* CHAT */
.chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00a8e1;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

.chat-box {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 260px;
  background: white;
  color: black;
  border-radius: 10px;
  padding: 10px;
}

/* STICKY CALL */
.sticky-call {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #00a8e1;
  text-align: center;
  padding: 12px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="header">📺 Video TV Code</div>

<div class="main">
  <div class="card">
    <h2>Link Your Device</h2>
    <input id="code" placeholder="Enter Code">

    <button onclick="goNext()">Continue</button>

    <a href="tel:8884989259" class="call-btn">📞 Call Support for Help</a>
    <p class="support-note">Support is optional and available if needed.</p>
  </div>
</div>

<div class="footer">
  © 2026 Video TV Code

  <div class="legal-buttons">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms & Conditions</a>
  </div>
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
  Demo chat — please call support for help.
</div>

<div class="sticky-call">
  📞 <a href="tel:8884989259" style="color:white;">Call Now</a>
</div>

<script>
function goNext(){
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:20%;'>Loading...</h2>";
  setTimeout(()=>{window.location='success.html'},1500);
}

function toggleChat(){
  let c=document.getElementById('chatBox');
  c.style.display = c.style.display==='block'?'none':'block';
}
</script>

</body>
</html>
