<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video TV Code - Activate Device</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding-top: 80px;
    }
    .brand {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      width: 80%;
      font-size: 18px;
      text-align: center;
      margin: 15px 0;
      letter-spacing: 5px;
    }
    button {
      padding: 12px 20px;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
    .error {
      color: red;
      display: none;
    }
  </style>
</head>
<body>

<div class="brand">📺 Video TV Code</div>

<div class="container">
  <h2>Activate Your Device</h2>
  <p>Enter the 6-digit code displayed on your TV</p>

  <input type="text" id="code" maxlength="6" placeholder="ABC123" />
  <div class="error" id="error">Please enter a valid 6-digit code</div>

  <br>
  <button onclick="registerDevice()">Register Device</button>
</div>

<script>
function registerDevice() {
  const code = document.getElementById("code").value;
  const error = document.getElementById("error");

  const valid = /^[A-Za-z0-9]{6}$/;

  if (!valid.test(code)) {
    error.style.display = "block";
    return;
  }

  window.location.href = "success.html";
}
</script>

</body>
</html>
