<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Linked</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #1a2a3a, #0f171e);
  color: white;
}

/* HEADER */
.header {
  padding: 20px 40px;
  font-size: 32px;
  font-weight: bold;
}

/* MAIN CONTAINER */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 70vh;
}

.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 16px;
  text-align: center;
  width: 400px;
}

.success {
  font-size: 26px;
  color: #00d084;
}

.call-btn {
  display: block;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(90deg,#1f80e0,#1558a6);
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

/* LEGAL BUTTONS */
.legal-buttons {
  margin-top: 20px;
  text-align: center;
}

.legal-buttons a {
  display: inline-block;
  padding: 8px 14px;
  margin: 5px;
  font-size: 12px;
  color: #00a8e1;
  border: 1px solid #00a8e1;
  border-radius: 6px;
  text-decoration: none;
}

.legal-buttons a:hover {
  background: #00a8e1;
  color: white;
}

/* CHAT */
.chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00a8e1;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

.chat-box {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 260px;
  background: white;
  color: black;
  border-radius: 10px;
  padding: 10px;
}

/* STICKY CALL */
.sticky-call {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #00a8e1;
  text-align: center;
  padding: 12px;
}
</style>
</head>

<body>

<!-- HEADER / COMPANY NAME -->
<div class="header">📺 Video TV Code</div>

<!-- MAIN CONTENT -->
<div class="container">
  <div class="box">
    <div class="success">✔ Device Linked</div>
    <p>Your device has been successfully connected.</p>

    <a href="tel:8884989259" class="call-btn">
      📞 Call Support for Help
    </a>
  </div>
</div>

<!-- LEGAL BUTTONS -->
<div class="legal-buttons">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms & Conditions</a>
</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
  Demo chat — please call support for help.
</div>

<!-- STICKY CALL BAR -->
<div class="sticky-call">
  📞 <a href="tel:8884989259" style="color:white;">Call Now</a>
</div>

<script>
function toggleChat(){
  let c = document.getElementById('chatBox');
  c.style.display = c.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
